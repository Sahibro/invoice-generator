<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Invoice Generator PRO</title>
<style>
body{font-family:Arial;background:#f4f6f8;padding:20px}
.container{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:10px}
input,button{padding:8px;margin:5px 0;width:100%}
button{background:#111;color:#fff;border:none;cursor:pointer}
.history-item{border-bottom:1px solid #ddd;padding:10px}
</style>
</head>

<body>
<div class="container">

<h2>Invoice Generator (PRO)</h2>

<input id="invoiceNo" placeholder="Invoice No">
<input id="clientName" placeholder="Client Name">
<input id="amount" type="number" placeholder="Amount">

<button id="saveBtn">Save</button>

<h3>History</h3>
<div id="history"></div>

</div>

<script>

/* =========================
   ✅ CLEAN DB LAYER
========================= */
const DB_NAME = "InvoicesDB";
const STORE = "invoices";

function openDB(){
  return new Promise((res,rej)=>{
    const req = indexedDB.open(DB_NAME,1);

    req.onupgradeneeded = e=>{
      const db = e.target.result;
      if(!db.objectStoreNames.contains(STORE)){
        db.createObjectStore(STORE,{keyPath:"id"});
      }
    };

    req.onsuccess = ()=>res(req.result);
    req.onerror = ()=>rej(req.error);
  });
}

async function saveInvoiceDB(data){
  const db = await openDB();

  return new Promise((res,rej)=>{
    const tx = db.transaction(STORE,"readwrite");
    tx.objectStore(STORE).put(data);
    tx.oncomplete = ()=>res(true);
    tx.onerror = ()=>rej(tx.error);
  });
}

async function getAllInvoicesDB(){
  const db = await openDB();

  return new Promise((res,rej)=>{
    const tx = db.transaction(STORE,"readonly");
    const req = tx.objectStore(STORE).getAll();

    req.onsuccess = ()=>{
      let data = req.result || [];

      // ✅ stable sorting
      data.sort((a,b)=> new Date(b.savedAt)-new Date(a.savedAt));

      res(data);
    };

    req.onerror = ()=>rej(req.error);
  });
}

async function deleteInvoiceDB(id){
  const db = await openDB();
  const tx = db.transaction(STORE,"readwrite");
  tx.objectStore(STORE).delete(id);
}

/* =========================
   ✅ LOGIC LAYER
========================= */
function buildData(){
  return {
    id:"inv_"+Date.now(),
    invoiceNo:invoiceNo.value,
    clientName:clientName.value,
    amount:amount.value,
    savedAt:new Date().toISOString()
  };
}

/* =========================
   ✅ UI LAYER
========================= */
async function renderHistory(){
  const list = document.getElementById("history");
  list.innerHTML="Loading...";

  const data = await getAllInvoicesDB();

  if(!data.length){
    list.innerHTML="No Data";
    return;
  }

  list.innerHTML="";

  data.forEach(item=>{
    const div=document.createElement("div");
    div.className="history-item";

    div.innerHTML=`
      <b>${item.invoiceNo}</b><br>
      ${item.clientName}<br>
      ₹ ${item.amount}<br><br>

      <button onclick="loadData('${item.id}')">Load</button>
      <button onclick="deleteData('${item.id}')">Delete</button>
    `;

    list.appendChild(div);
  });
}

/* =========================
   ACTIONS
========================= */
saveBtn.onclick = async ()=>{
  const data = buildData();

  await saveInvoiceDB(data);

  await renderHistory(); // instant refresh

  alert("Saved ✅");
};

window.loadData = async (id)=>{
  const data = await getAllInvoicesDB();
  const item = data.find(x=>x.id===id);

  if(!item) return;

  invoiceNo.value = item.invoiceNo;
  clientName.value = item.clientName;
  amount.value = item.amount;

  alert("Loaded ✅");
};

window.deleteData = async (id)=>{
  if(!confirm("Delete?")) return;

  await deleteInvoiceDB(id);

  renderHistory();
};

/* INIT */
renderHistory();

</script>

</body>
</html>
