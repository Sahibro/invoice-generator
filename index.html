<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Luxurious Invoice Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
  body {margin:0; font-family:'Poppins',sans-serif; background:linear-gradient(135deg,#fdfcfb,#e2d1c3); color:#222;}
  h1,h2 {font-family:'Playfair Display',serif;}
  .container {max-width:1200px; margin:auto; padding:20px; display:grid; grid-template-columns:1fr 400px; gap:20px;}
  .card {background:#fff; border-radius:12px; padding:20px; box-shadow:0 8px 24px rgba(0,0,0,0.08);}
  label {font-size:13px; color:#555; margin-bottom:6px; display:block;}
  input {width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:12px;}
  .btn {padding:12px 18px; border:none; border-radius:8px; cursor:pointer; font-weight:600;}
  .btn.primary {background:linear-gradient(90deg,#d4af37,#f5d76e); color:#222;}
  .btn.ghost {background:#fff; border:1px solid #ccc;}
  .items {margin-top:10px;}
  .item-row {display:grid; grid-template-columns:2fr 1fr 1fr 40px; gap:8px; margin-bottom:10px;}
  .item-row input {margin:0;}
  .remove {background:none; border:none; color:#b00; font-size:18px; cursor:pointer;}
  .summary {margin-top:20px;}
  .summary div {display:flex; justify-content:space-between; margin:6px 0;}
  .summary .total {font-size:18px; font-weight:700;}
  .invoice {padding:20px; border:1px solid #eee; border-radius:12px; background:#fff;}
  .invoice .top {display:flex; justify-content:space-between;}
  .inv-table {width:100%; border-collapse:collapse; margin-top:12px;}
  .inv-table th, .inv-table td {padding:10px; border-bottom:1px solid #eee;}
  @media(max-width:900px){.container{grid-template-columns:1fr;}}
  @media print{body{background:#fff;padding:0}.container,.btn{display:none}.invoice{box-shadow:none;border:none}}
</style>
</head>
<body>
<div class="container">
  <!-- Left: Form -->
  <section class="card">
    <h2>Invoice Details</h2>
    <label>Company Name</label><input id="companyName" type="text" value="Luxury Corp">
    <label>Client Name</label><input id="clientName" type="text" value="Client Co.">
    <label>Invoice Number</label><input id="invoiceNo" type="text" value="INV-001">
    <label>Date</label><input id="invoiceDate" type="date">
    <h3>Line Items</h3>
    <div id="itemsContainer"></div>
    <button id="addItem" class="btn ghost">+ Add Item</button>
    <div style="margin-top:12px; display:flex; gap:10px;">
      <button id="printBtn" class="btn primary">Print</button>
      <button id="downloadPdfBtn" class="btn ghost">Download PDF</button>
    </div>
  </section>

  <!-- Right: Summary -->
  <aside class="card">
    <h2>Summary</h2>
    <label>Tax (%)</label><input id="taxRate" type="number" value="18">
    <div class="summary">
      <div><span>Subtotal</span><span id="subtotal">₹0.00</span></div>
      <div><span>Tax</span><span id="taxAmount">₹0.00</span></div>
      <div class="total"><span>Total</span><span id="grandTotal">₹0.00</span></div>
    </div>
  </aside>

  <!-- Full-width Preview -->
  <section class="card" style="grid-column:1/-1">
    <h2>Invoice Preview</h2>
    <div class="invoice" id="invoicePreview">
      <div class="top">
        <div><h2 id="previewCompany">Luxury Corp</h2></div>
        <div style="text-align:right">
          <div>No: <span id="previewInvNo">INV-001</span></div>
          <div>Date: <span id="previewDate">-</span></div>
        </div>
      </div>
      <div style="margin-top:12px">Bill To: <strong id="previewClient">Client Co.</strong></div>
      <table class="inv-table"><thead><tr><th>Description</th><th>Price</th><th>Qty</th><th>Amount</th></tr></thead><tbody id="invBody"></tbody></table>
      <div style="text-align:right; margin-top:12px; font-weight:700">Total: <span id="pTotal">₹0.00</span></div>
    </div>
  </section>
</div>

<!-- PDF libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const $=id=>document.getElementById(id);
function formatCurrency(v){return new Intl.NumberFormat('en-IN',{style:'currency',currency:'INR'}).format(v);}
function createItemRow(desc='',price=0,qty=1){
  const row=document.createElement('div');row.className='item-row';
  row.innerHTML=`<input class="desc" placeholder="Service" value="${desc}"><input class="price" type="number" value="${price}"><input class="qty" type="number" value="${qty}"><button class="remove">×</button>`;
  row.querySelector('.remove').onclick=()=>{row.remove();updateAll();};
  ['desc','price','qty'].forEach(cls=>row.querySelector('.'+cls).oninput=updateAll);
  $('itemsContainer').appendChild(row);
}
function gatherItems(){
  return [...document.querySelectorAll('.item-row')].map(r=>({desc:r.querySelector('.desc').value,price:parseFloat(r.querySelector('.price').value)||0,qty:parseFloat(r.querySelector('.qty').value)||0}));
}
function updateAll(){
  const items=gatherItems();let subtotal=0;items.forEach(i=>subtotal+=i.price*i.qty);
  const taxRate=parseFloat($('taxRate').value)||0;const tax=subtotal*taxRate/100;const total=subtotal+tax;
  $('subtotal').textContent=formatCurrency(subtotal);$('taxAmount').textContent=formatCurrency(tax);$('grandTotal').textContent=formatCurrency(total);
  $('previewCompany').textContent=$('companyName').value;$('previewClient').textContent=$('clientName').value;$('previewInvNo').textContent=$('invoiceNo').value;$('previewDate').textContent=$('invoiceDate').value;
  const tbody=$('invBody');tbody.innerHTML='';items.forEach(i=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${i.desc}</td><td>${formatCurrency(i.price)}</td><td>${i.qty}</td><td>${formatCurrency(i.price*i.qty)}</td>`;tbody.appendChild(tr);});
  $('pTotal').textContent=formatCurrency(total);
}
$('addItem').onclick=()=>createItemRow();
createItemRow('Consulting',5000,1);
updateAll();
$('printBtn').onclick=()=>window.print();
$('downloadPdfBtn').onclick=async()=>{
  const invoiceEl=$('invoicePreview');
  const canvas=await html2canvas(invoiceEl,{scale:2});
  const imgData=canvas.toDataURL('image/png');
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF('p','pt','a4');
  const pageWidth=pdf.internal.pageSize.getWidth();
  const pageHeight=pdf.internal.pageSize.getHeight();
  const imgWidth=pageWidth;
  const imgHeight=canvas.height*pageWidth/canvas.width;
  pdf.addImage(imgData,'PNG',0,0,imgWidth,imgHeight);
  pdf.save(($('invoiceNo').value||'invoice')+'.pdf');
};
</script>
</body>
</html>
