<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Invoice Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Inter,sans-serif;
}

body{
background:#f4f6fb;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

h1{
margin-bottom:10px;
}

label{
font-size:13px;
color:#555;
display:block;
margin-bottom:5px;
}

input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ddd;
margin-bottom:10px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

.primary{
background:#0ea5a4;
color:white;
}

.ghost{
background:#eee;
}

.items-header,
.item{
display:grid;
grid-template-columns:2fr 1fr 1fr 1fr 40px;
gap:10px;
margin-top:10px;
}

.items-header{
font-weight:600;
font-size:13px;
}

.item input{
margin:0;
}

.remove{
background:#ef4444;
color:white;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

.summary{
margin-top:20px;
}

.summary div{
display:flex;
justify-content:space-between;
margin-bottom:5px;
}

.total{
font-size:18px;
font-weight:700;
}

.logo{
max-width:120px;
margin-bottom:10px;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<h1>Professional Invoice Generator</h1>

<div class="container">

<div class="card">

<label>Company Name</label> <input id="company" value="Your Company">

<label>Client Name</label> <input id="client" value="Client Name">

<label>Invoice Number</label> <input id="invno" value="INV-001">

<label>Date</label> <input type="date" id="date">

<label>Upload Logo</label> <input type="file" id="logoUpload">

<h3>Items</h3>

<div class="items-header">
<div>Description</div>
<div>Price</div>
<div>Qty</div>
<div>Total</div>
<div></div>
</div>

<div id="items"></div>

<button class="ghost" onclick="addItem()">Add Item</button>

<br><br>

<label>Tax %</label> <input id="tax" type="number" value="18">

<label>Discount</label> <input id="discount" type="number" value="0">

<br>

<button class="primary" onclick="downloadPDF()">Download PDF</button> <button onclick="window.print()">Print</button>

</div>

<div class="card">

<div id="invoice">

<img id="logoPreview" class="logo">

<h2 id="pCompany"></h2>

<div>
Invoice #: <span id="pInv"></span><br>
Date: <span id="pDate"></span>
</div>

<br>

<strong>Bill To:</strong>

<div id="pClient"></div>

<table>
<thead>
<tr>
<th>Description</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
</tr>
</thead>

<tbody id="previewItems"></tbody>

</table>

<div class="summary">
<div><span>Subtotal</span><span id="sub"></span></div>
<div><span>Tax</span><span id="taxv"></span></div>
<div><span>Discount</span><span id="dis"></span></div>
<div class="total"><span>Total</span><span id="total"></span></div>
</div>

</div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

const items=document.getElementById("items")

function addItem(){

const row=document.createElement("div")
row.className="item"

row.innerHTML=`
<input class="desc">
<input type="number" class="price" value="0">
<input type="number" class="qty" value="1">
<input class="total" disabled>
<button class="remove">X</button>
`

row.querySelector(".remove").onclick=()=>row.remove()

items.appendChild(row)

}

addItem()

setInterval(update,500)

function update(){

const company=document.getElementById("company").value
const client=document.getElementById("client").value
const inv=document.getElementById("invno").value
const date=document.getElementById("date").value

document.getElementById("pCompany").innerText=company
document.getElementById("pClient").innerText=client
document.getElementById("pInv").innerText=inv
document.getElementById("pDate").innerText=date

const rows=document.querySelectorAll(".item")

let subtotal=0
let html=""

rows.forEach(r=>{

const desc=r.querySelector(".desc").value
const price=Number(r.querySelector(".price").value)
const qty=Number(r.querySelector(".qty").value)

const total=price*qty

r.querySelector(".total").value=total

subtotal+=total

html+=`
<tr>
<td>${desc}</td>
<td>${price}</td>
<td>${qty}</td>
<td>${total}</td>
</tr>
`

})

document.getElementById("previewItems").innerHTML=html

const taxRate=Number(document.getElementById("tax").value)
const discount=Number(document.getElementById("discount").value)

const tax=subtotal*(taxRate/100)

const total=subtotal+tax-discount

document.getElementById("sub").innerText=subtotal
document.getElementById("taxv").innerText=tax
document.getElementById("dis").innerText=discount
document.getElementById("total").innerText=total

}

document.getElementById("logoUpload").onchange=e=>{

const file=e.target.files[0]
const reader=new FileReader()

reader.onload=function(){
document.getElementById("logoPreview").src=reader.result
}

reader.readAsDataURL(file)

}

async function downloadPDF(){

const {jsPDF}=window.jspdf

const element=document.getElementById("invoice")

const canvas=await html2canvas(element)

const img=canvas.toDataURL("image/png")

const pdf=new jsPDF("p","mm","a4")

const width=210
const height=canvas.height*width/canvas.width

pdf.addImage(img,"PNG",0,0,width,height)

pdf.save("invoice.pdf")

}

</script>

</body>
</html>
